- type: entity
  id: EnergyDispenserBase
  parent: EnergyChemDispenser
  suffix: Energy
  abstract: true
  components:
  - type: Rotatable
  - type: Transform
    noRot: false
  - type: Sprite
    sprite: Structures/smalldispensers.rsi
    drawdepth: SmallObjects
    snapCardinals: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.3,0.4,0.3"
        density: 190
        mask:
        - TabletopMachineMask
        layer:
        - TabletopMachineLayer
  - type: GuideHelp
    guides:
    - Bartender
    - Drinks

- type: entity
  parent: EnergyDispenserBase
  id: EnergyBoozeDispenser
  name: energy booze dispenser
  description: A drunk mans best dream. Using the power of bluespace, this dispenser uses station energy to produce alcoholic beverages! Now you can get wasted without leaving the bar to restock! Ever!
  components:
  - type: Machine # Trauma
    board: EnergyBoozeDispenserMachineCircuitboard
  - type: Sprite
    state: booze
  - type: StealTarget
    stealGroup: BoozeDispenser
  - type: EnergyReagentDispenser
    reagents:
      Absinthe: 5
      Ale: 5
      Beer: 5
      BlueCuracao: 5
      Cognac: 5
      Gin: 5
      Mead: 5
      Gildlager: 5
      CoffeeLiqueur: 5
      MelonLiquor: 5
      Patron: 5
      Rum: 5
      Tequila: 5
      Vermouth: 5
      Vodka: 5
      Whiskey: 5
      Wine: 5
      Champagne: 5
      KelpPodWine: 5
      Sake: 5

- type: entity
  parent: EnergyDispenserBase
  id: EnergySodaDispenser
  name: energy soda dispenser
  description: Soda? We got it! This bluespace dispenser, using station energy, produces a variety of non alchoholic drinks for the thirsty and the health conscious alike!
  components:
  - type: Machine # Trauma
    board: EnergySodaDispenserMachineCircuitboard
  - type: Sprite
    state: soda
  - type: StealTarget
    stealGroup: SodaDispenser
  - type: EnergyReagentDispenser
    reagents:
      CoconutWater: 5
      Coffee: 5
      Cola: 5
      Cream: 5
      DrGibb: 5
      EnergyDrink: 5
      GreenTea: 5
      Ice: 5
      JuiceLime: 5
      JuiceOrange: 5
      JuiceWatermelon: 5
      LemonLime: 5
      RootBeer: 5
      SodaWater: 5
      SpaceMountainWind: 5
      SpaceUp: 5
      Sugar: 5
      Tea: 5
      TonicWater: 5
      Water: 1
